name: Fetch Content

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC (10 AM Beijing)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch GitHub repos
        run: npx tsx scripts/fetch-github-repos.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ vars.GH_USERNAME }}

      - name: Fetch CSDN articles
        run: npx tsx scripts/fetch-csdn-articles.ts
        env:
          CSDN_USERNAME: ${{ vars.CSDN_USERNAME }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update content [skip ci]"
          git push
